<!DOCTYPE html>
<html>
<head>
<title>Student Result Portal</title>
<style>
body{
font-family:Arial;
background:linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px gray;
width:350px;
text-align:center;
}
input{
width:90%;
padding:10px;
margin:10px;
}
button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
#result{
margin-top:15px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="box">
<h2>Student Result Portal</h2>
<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="roll" placeholder="Enter Roll No">
<button onclick="showResult()">Check Result</button>
<div id="result"></div>
</div>

<script>
function showResult(){
let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;
document.getElementById("result").innerHTML=
"Student: "+name+"<br>Roll No: "+roll+"<br>Status: PASS<br>Percentage: 82%";
}
</script>
</body>
</html>
